name: Build and Push Docker images

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-cups:
    name: Build and push hanxi/cups
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push hanxi/cups (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./cups
          file: ./cups/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            hanxi/cups:${{ github.ref_name }}${{ github.ref_type == 'tag' && '
            hanxi/cups:latest' || '' }}
          cache-from: type=gha,scope=cups
          cache-to: type=gha,scope=cups,mode=max

  build-cups-web:
    name: Build and push hanxi/cups-web
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push hanxi/cups-web (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          # 把 github.ref_name 透传给 Dockerfile 的 ARG VERSION，
          # 最终通过 -ldflags "-X main.Version=..." 注入到二进制（Issue #26）。
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            hanxi/cups-web:${{ github.ref_name }}${{ github.ref_type == 'tag' && '
            hanxi/cups-web:latest' || '' }}
          cache-from: type=gha,scope=cups-web
          cache-to: type=gha,scope=cups-web,mode=max

  output:
    name: Output pushed image refs
    runs-on: ubuntu-latest
    needs:
      - build-cups
      - build-cups-web
    steps:
      - name: Output pushed image refs
        run: |
          echo "Pushed hanxi/cups:${{ github.ref_name }}${{ github.ref_type == 'tag' && ' and hanxi/cups:latest' || '' }}"
          echo "Pushed hanxi/cups-web:${{ github.ref_name }}${{ github.ref_type == 'tag' && ' and hanxi/cups-web:latest' || '' }}"
