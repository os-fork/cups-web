name: Push CUPS image to GHCR

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
    paths:
      - 'cups/**'
      - '.github/workflows/cups-docker-ghcr.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: '覆盖 tag 名（留空则用分支名或 git tag）'
        required: false
        type: string
        default: ''
      platforms:
        description: '构建平台（逗号分隔），留空默认全架构'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64,linux/arm/v7'
      base_tag:
        description: '基础镜像 hanxi/cups 的 tag（默认 master）'
        required: false
        type: string
        default: 'master'

permissions:
  packages: write

jobs:
  build-and-push:
    name: Build and push ghcr.io/hanxi/cups
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cups
          tags: |
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=ref,event=branch,enable=${{ inputs.tag == '' }}
            type=semver,pattern={{version}},enable=${{ inputs.tag == '' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ inputs.tag == '' }}
            type=semver,pattern={{major}},enable=${{ inputs.tag == '' }}
            type=raw,value=latest,enable=${{ inputs.tag == '' && github.ref_type == 'tag' }}

      - name: Build and push ghcr.io/hanxi/cups (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./cups
          file: ./cups/Dockerfile.ghcr
          platforms: ${{ inputs.platforms || 'linux/amd64,linux/arm64,linux/arm/v7' }}
          build-args: |
            CUPS_BASE_TAG=${{ inputs.base_tag || 'master' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cups-ghcr
          cache-to: type=gha,scope=cups-ghcr,mode=max
