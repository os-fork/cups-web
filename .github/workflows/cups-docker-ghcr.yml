name: Push CUPS image to GHCR

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
    paths:
      - 'cups/**'
      - '.github/workflows/cups-docker-ghcr.yml'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build-and-push:
    name: Build and push ghcr.io/hanxi/cups
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/cups
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push ghcr.io/hanxi/cups (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./cups
          file: ./cups/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cups-ghcr
          cache-to: type=gha,scope=cups-ghcr,mode=max
